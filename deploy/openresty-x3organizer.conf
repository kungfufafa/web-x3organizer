# OpenResty / 1Panel — x3organizer.com (static Vite SPA + SEO per-route)
# Root: upload isi folder dist/ ke /www/sites/x3organizer.com/index/
#
# Setelah edit: nginx -t && openresty -s reload  (atau reload dari panel)

server {
    listen 80;
    listen 443 ssl;
    http2 on;

    server_name x3organizer.com www.x3organizer.com;

    root /www/sites/x3organizer.com/index;
    index index.html;

    access_log /www/sites/x3organizer.com/log/access.log main;
    error_log  /www/sites/x3organizer.com/log/error.log;

    # ── SSL (sesuaikan path sertifikat panel Anda) ──
    ssl_certificate     /www/sites/x3organizer.com/ssl/fullchain.pem;
    ssl_certificate_key /www/sites/x3organizer.com/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA256:!aNULL:!eNULL:!EXPORT:!DSS:!DES:!RC4:!3DES:!MD5:!PSK:!KRB5:!SRP:!CAMELLIA:!SEED;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # HTTP → HTTPS
    if ($scheme = http) {
        return 301 https://$host$request_uri;
    }
    error_page 497 https://$host$request_uri;

    # Canonical: arahkan www → non-www (opsional — ubah jika prefer www)
    if ($host = www.x3organizer.com) {
        return 301 https://x3organizer.com$request_uri;
    }

    # ── Keamanan (dari config panel) ──
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }
    location ^~ /.well-known/acme-challenge {
        allow all;
        root /usr/share/nginx/html;
    }
    if ($uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$") {
        return 403;
    }

    # ── Cache asset build (Vite hash di nama file) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /robots.txt {
        add_header Cache-Control "public, max-age=86400";
    }

    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=86400";
        default_type application/xml;
    }

    location = /favicon.ico {
        expires 7d;
        access_log off;
    }

    # ── SPA + SEO pre-render (dist/.../index.html per route) ──
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    # JANGAN pakai error_page 404 /404.html untuk SPA —
    # fallback sudah ditangani try_files → /index.html
}
